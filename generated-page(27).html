<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restricted Access</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { 
            font-family: 'JetBrains Mono', monospace; 
            background-color: #000000;
        }

        ::-webkit-scrollbar { width: 0.25rem; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 0.125rem; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.4); }

        .scanline {
            width: 100%;
            height: 100px;
            background: linear-gradient(0deg, rgba(0,0,0,0) 0%, rgba(255,255,255,0.05) 50%, rgba(0,0,0,0) 100%);
            opacity: 0.5;
            position: absolute;
            bottom: 100%;
            animation: scanline 8s linear infinite;
            pointer-events: none;
            z-index: 50;
        }

        @keyframes scanline {
            0% { bottom: 100%; }
            100% { bottom: -100px; }
        }

        @keyframes multiColorBlink {
            0% { color: #ff0000; text-shadow: 0 0 10px #ff0000; }
            12.5% { color: #000000; text-shadow: none; }
            25% { color: #00ff00; text-shadow: 0 0 10px #00ff00; }
            37.5% { color: #0000ff; text-shadow: 0 0 10px #0000ff; }
            50% { color: #000000; text-shadow: none; }
            62.5% { color: #ffff00; text-shadow: 0 0 10px #ffff00; }
            75% { color: #ff00ff; text-shadow: 0 0 10px #ff00ff; }
            87.5% { color: #00ffff; text-shadow: 0 0 10px #00ffff; }
            100% { color: #ff0000; text-shadow: 0 0 10px #ff0000; }
        }

        .animate-multi-blink {
            animation: multiColorBlink 0.8s step-end infinite;
        }
    </style>
</head>
<body class="min-h-screen text-zinc-300 antialiased flex flex-col items-center p-4 sm:p-8 relative overflow-x-hidden">
    
    <div class="fixed inset-0 z-0 pointer-events-none">
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,_rgba(40,40,40,0.4)_0%,_rgba(0,0,0,1)_80%)]"></div>
        <div class="scanline"></div>
    </div>

    <main class="w-full max-w-lg flex flex-col relative z-10 mt-8 sm:mt-16 gap-8">
        
        <header class="flex flex-col items-center text-center">
            <div class="relative w-16 h-16 rounded-full border border-white/20 flex items-center justify-center mb-6 shadow-[0_0_40px_rgba(255,255,255,0.15)] group">
                <div class="absolute inset-0 animate-[spin_4s_linear_infinite]">
                    <div class="absolute inset-0 rounded-full border border-white/30 border-dashed"></div>
                    <div class="absolute -bottom-1 -right-1 w-2.5 h-2.5 bg-white rounded-full shadow-[0_0_12px_rgba(255,255,255,1)]"></div>
                    <div class="absolute top-1.5 left-1.5 w-1.5 h-1.5 bg-white/60 rounded-full shadow-[0_0_5px_rgba(255,255,255,0.8)]"></div>
                </div>
                <i data-lucide="lock" stroke-width="1.5" class="text-white w-6 h-6 drop-shadow-[0_0_12px_rgba(255,255,255,0.8)]"></i>
            </div>
            
            <h1 class="text-2xl font-normal tracking-tight text-white drop-shadow-[0_0_15px_rgba(255,255,255,0.5)] uppercase mb-3">
                Access Restricted
            </h1>
            <p class="text-base text-zinc-500 tracking-widest uppercase">
                𝐈𝐧͢ 乂⎯𝐆𝐇04𝐒𝐓⎯𝗛𝟯̷༏
            </p>
        </header>

        <section class="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-5 sm:p-6 shadow-[0_0_50px_rgba(0,0,0,0.8)] relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-zinc-600/40 to-transparent"></div>
            
            <label class="block text-base text-zinc-500 tracking-widest uppercase mb-4">
                // ENTER YOUR NUMBER
            </label>
            
            <input type="text" id="phone-input" maxlength="10" placeholder="XXXXXXXXXX" class="w-full bg-zinc-900 border border-zinc-800 rounded-md py-3.5 px-4 text-lg text-center text-zinc-200 placeholder-zinc-700 tracking-widest focus:outline-none focus:border-zinc-500 focus:shadow-[0_0_20px_rgba(255,255,255,0.1)] transition-all">
            
            <button id="fetch-btn" class="w-full mt-5 bg-white border border-white rounded-md py-3.5 flex items-center justify-center gap-3 text-black font-medium text-base tracking-[0.15em] transition-all shadow-[0_0_20px_rgba(255,255,255,0.2)] hover:bg-zinc-200 hover:shadow-[0_0_25px_rgba(255,255,255,0.3)]">
                <i data-lucide="key" stroke-width="1.5" class="w-4 h-4"></i>
                ACCESS GHOST INFO
            </button>
        </section>

        <section class="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-5 shadow-[0_0_50px_rgba(0,0,0,0.8)] flex flex-col relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-zinc-600/40 to-transparent"></div>
            
            <div class="flex items-center border-b border-zinc-800/80 pb-4 mb-4 gap-3">
                <div class="flex items-center gap-1.5">
                    <div class="w-2.5 h-2.5 rounded-full bg-white/80 shadow-[0_0_8px_rgba(255,255,255,0.5)]"></div>
                    <div class="w-2.5 h-2.5 rounded-full bg-zinc-800"></div>
                    <div class="w-2.5 h-2.5 rounded-full bg-zinc-800"></div>
                </div>
                <span class="text-base text-zinc-500 tracking-widest uppercase ml-2">System Terminal</span>
            </div>

            <div id="terminal-output" class="text-base leading-relaxed flex flex-col gap-2 h-40 overflow-y-auto pr-2">
                <div class="flex gap-2">
                    <span class="text-blue-500 shrink-0">[SYS]</span>
                    <span class="text-zinc-400">In_X-GH04ST-H3r v3.0 - Online</span>
                </div>
                <div class="flex gap-2">
                    <span class="text-zinc-500 shrink-0">[ENC]</span>
                    <span class="text-zinc-600">AES-256 Encryption Active</span>
                </div>
                <div class="flex gap-2 mt-auto text-zinc-700">
                    <span class="animate-pulse">_</span>
                </div>
            </div>
        </section>

        <section id="results-container" class="w-full flex flex-col gap-5 empty:hidden"></section>

    </main>

    <footer class="w-full text-center mt-auto py-8 relative z-10">
        <span class="animate-multi-blink text-base tracking-widest font-normal uppercase">
            In_X-GH04ST-H3r ; Secure &amp; Encrypted ;
        </span>
    </footer>

    <script>
        lucide.createIcons();

        const inputField = document.getElementById('phone-input');
        const fetchBtn = document.getElementById('fetch-btn');
        const terminalOutput = document.getElementById('terminal-output');
        const resultsContainer = document.getElementById('results-container');

        function getTimeString() {
            const now = new Date();
            return `[${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}]`;
        }

        function appendLog(type, msg) {
            const lastChild = terminalOutput.lastElementChild;
            if (lastChild && lastChild.textContent.trim() === '_') {
                terminalOutput.removeChild(lastChild);
            }

            const div = document.createElement('div');
            div.className = 'flex gap-2';
            let content = '';
            
            if (type === 'sys') content = `<span class="text-blue-500 shrink-0">[SYS]</span> <span class="text-zinc-400 break-words">${msg}</span>`;
            else if (type === 'enc') content = `<span class="text-zinc-500 shrink-0">[ENC]</span> <span class="text-zinc-600 break-words">${msg}</span>`;
            else if (type === 'cloud') content = `<span class="text-yellow-500 shrink-0">[CLOUD]</span> <span class="text-yellow-600 break-words">${msg}</span>`;
            else if (type === 'time-load') content = `<span class="text-blue-600 shrink-0">${getTimeString()}</span> <span class="text-blue-400 break-words">${msg}</span>`;
            else if (type === 'time-success') content = `<span class="text-green-600 shrink-0">${getTimeString()}</span> <span class="text-green-500 break-words">${msg}</span>`;
            else if (type === 'time-error') content = `<span class="text-zinc-500 shrink-0">${getTimeString()}</span> <span class="text-zinc-300 break-words">${msg}</span>`;

            div.innerHTML = content;
            terminalOutput.appendChild(div);

            const cursorDiv = document.createElement('div');
            cursorDiv.className = 'flex gap-2 mt-auto text-zinc-700';
            cursorDiv.innerHTML = '<span class="animate-pulse">_</span>';
            terminalOutput.appendChild(cursorDiv);

            terminalOutput.scrollTop = terminalOutput.scrollHeight;
        }

        inputField.addEventListener('input', function() {
            this.value = this.value.replace(/[^0-9]/g, '').slice(0, 10);
        });

        inputField.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                fetchBtn.click();
            }
        });

        fetchBtn.addEventListener('click', async () => {
            const num = inputField.value.trim();
            
            if(num.length !== 10) {
                appendLog('time-error', 'ERR: Invalid authorization key format.');
                return;
            }

            resultsContainer.innerHTML = '';
            appendLog('cloud', 'Connecting to key server...');
            
            await new Promise(resolve => setTimeout(resolve, 500));
            appendLog('time-load', 'Fetching data from secure cloud...');

            try {
                const response = await fetch(`https://yttttttt.anshapi.workers.dev/?key=DARKOSINT&num=${num}`);
                const data = await response.json();

                if (!data.success || !data.result || data.result.length === 0) {
                    appendLog('time-error', 'ACCESS DENIED: Key sequence not found in registry.');
                    return;
                }

                appendLog('time-success', `Loaded ${data.result.length} encrypted packets ✓`);

                data.result.forEach((record, index) => {
                    const cardHTML = `
                        <div class="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-5 relative overflow-hidden group transition-all duration-500 shadow-[0_0_30px_rgba(0,0,0,0.5)] hover:border-zinc-700 hover:shadow-[0_0_30px_rgba(255,255,255,0.05)]">
                            <div class="absolute top-0 left-0 w-1 h-full bg-zinc-800 group-hover:bg-zinc-600 transition-colors"></div>
                            
                            <div class="flex items-center justify-between border-b border-zinc-800/80 pb-4 mb-5">
                                <div class="flex items-center gap-2 text-white">
                                    <i data-lucide="database" stroke-width="1.5" class="w-5 h-5"></i>
                                    <h2 class="text-base tracking-widest uppercase">Decrypted Payload #${index + 1}</h2>
                                </div>
                                <div class="flex items-center gap-2 px-2.5 py-1 rounded bg-green-950/20 border border-green-900/30 text-green-500">
                                    <div class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse shadow-[0_0_8px_rgba(34,197,94,0.6)]"></div>
                                    <span class="text-base uppercase tracking-widest">Verified</span>
                                </div>
                            </div>

                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-y-5 gap-x-6 pl-2">
                                ${createHackerField('Identity Trace', record.name)}
                                ${createHackerField('Primary Comm', record.mobile || num)}
                                ${createHackerField('Origin Node', record.father_name)}
                                ${createHackerField('Alt Comm', record.alt_mobile)}
                                ${createHackerField('Network Zone', record.circle)}
                                ${createHackerField('Digital Route', record.email)}
                                ${createHackerField('Gov Hash ID', record.id_number)}
                                ${createHackerField('Sys Reg ID', record.id)}
                                ${createHackerField('Physical Vector', record.address, 'sm:col-span-2')}
                            </div>
                        </div>
                    `;
                    resultsContainer.insertAdjacentHTML('beforeend', cardHTML);
                });
                
                lucide.createIcons();

            } catch (err) {
                appendLog('time-error', 'CRITICAL ERR: Connection to host forcibly closed.');
            }
        });

        function createHackerField(label, value, colSpan = '') {
            const displayVal = (value && String(value).trim() !== '') ? value : 'NULL';
            const valClass = displayVal === 'NULL' ? 'text-zinc-600' : 'text-zinc-300';
            return `
                <div class="group/field relative flex flex-col gap-1.5 ${colSpan}">
                    <span class="text-base text-zinc-500 uppercase tracking-widest">${label}</span>
                    <span class="text-lg ${valClass} data-val break-words pr-8">${displayVal}</span>
                    <button onclick="copyDynamicData(this)" class="absolute right-0 top-1/2 flex items-center justify-center w-8 h-8 rounded text-zinc-500 hover:text-white opacity-0 group-hover/field:opacity-100 transition-all bg-zinc-900 border border-zinc-800 hover:border-zinc-600 hover:bg-zinc-800">
                        <span class="icon-copy flex items-center justify-center"><i data-lucide="copy" stroke-width="1.5" class="w-4 h-4"></i></span>
                        <span class="icon-check hidden items-center justify-center"><i data-lucide="check-circle" stroke-width="1.5" class="w-4 h-4 text-green-500"></i></span>
                    </button>
                </div>
            `;
        }

        window.copyDynamicData = function(btn) {
            const container = btn.closest('.group\\/field');
            const valSpan = container.querySelector('.data-val');
            const textToCopy = valSpan.textContent;
            
            if(textToCopy === 'NULL') return;

            navigator.clipboard.writeText(textToCopy).then(() => {
                const iconCopy = btn.querySelector('.icon-copy');
                const iconCheck = btn.querySelector('.icon-check');
                
                iconCopy.classList.add('hidden');
                iconCopy.classList.remove('flex');
                
                iconCheck.classList.remove('hidden');
                iconCheck.classList.add('flex');
                
                setTimeout(() => {
                    iconCopy.classList.remove('hidden');
                    iconCopy.classList.add('flex');
                    
                    iconCheck.classList.add('hidden');
                    iconCheck.classList.remove('flex');
                }, 2000);
            });
        }
    </script>

</body></html>
